<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Event</title>
<style>
body { font-family: system-ui, sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; }
form { display: flex; flex-direction: column; gap: 12px; }
label { font-weight: 600; }
input, textarea { padding: 8px; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; }
textarea { min-height: 80px; resize: vertical; }
button { padding: 10px; font-size: 1rem; background: #2563eb; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
button:hover { background: #1d4ed8; }
</style>
</head>
<body>
<h1>Create Event</h1>
<form id="eventForm">
<label for="summary">Summary</label>
<input type="text" id="summary" name="summary" required>

<label for="description">Description</label>
<textarea id="description" name="description"></textarea>

<label for="start">Start</label>
<input type="datetime-local" id="start" name="start" required>

<label for="end">End</label>
<input type="datetime-local" id="end" name="end" required>

<button type="submit">Create Event</button>
</form>
<script>
document.getElementById('eventForm').addEventListener('submit', async (e) => {
e.preventDefault();
const data = {
summary: document.getElementById('summary').value,
description: document.getElementById('description').value,
start: document.getElementById('start').value,
end: document.getElementById('end').value,
};
try {
const res = await fetch('/api/events', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify(data),
});
if (res.ok) alert('Event created');
else alert('Error: ' + await res.text());
} catch (err) {
alert('Error: ' + err.message);
}
});
</script>
</body>
</html>
